<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366F1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>QuickPulse - ニュース＆天気</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%236366F1' width='100' height='100' rx='20'/><text y='.9em' x='50%' text-anchor='middle' font-size='60'>⚡</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --primary: #6366F1;
            --secondary: #10B981;
            --bg: #0F172A;
            --surface: #1E293B;
            --surface-hover: #334155;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --accent: #F59E0B;
            --danger: #EF4444;
            --radius: 16px;
            --radius-sm: 8px;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Header */
        .header {
            text-align: center;
            padding: 30px 0 20px;
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: 8px;
        }

        /* Fetch Button */
        .fetch-section {
            display: flex;
            justify-content: center;
            padding: 30px 0;
        }

        .fetch-btn {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--primary), #818CF8);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 8px 32px rgba(99, 102, 241, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            overflow: visible;
        }

        .fetch-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .fetch-btn:not(:disabled):hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(99, 102, 241, 0.5);
        }

        .fetch-btn:not(:disabled):active {
            transform: scale(0.98);
        }

        .fetch-btn .icon {
            font-size: 2.5rem;
        }

        /* Pulse animation */
        .fetch-btn::before {
            content: '';
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0;
            z-index: -1;
            animation: pulse 2s ease-out infinite;
        }

        .fetch-btn.loading::before {
            animation: none;
            opacity: 0.3;
            inset: -20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }

        /* Loading Spinner */
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: var(--surface);
            border-radius: var(--radius);
            margin-bottom: 20px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .status-bar.offline {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .status-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--secondary);
        }

        .status-bar.offline .dot {
            background: var(--danger);
        }

        /* Section Headers */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 30px 0 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--surface);
        }

        .section-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .section-header .icon {
            font-size: 1.5rem;
        }

        /* Card Base */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .card:hover {
            background: var(--surface-hover);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 20px;
            margin-bottom: 10px;
        }

        .skeleton-title {
            height: 24px;
            width: 70%;
            margin-bottom: 16px;
        }

        .skeleton-meta {
            height: 16px;
            width: 40%;
        }

        /* News Cards */
        .news-grid {
            display: grid;
            gap: 12px;
        }

        @media (min-width: 640px) {
            .news-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .news-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .news-card {
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .news-card h3 {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card .meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .news-card .source {
            color: var(--primary);
            font-weight: 600;
        }

        /* Weather Section */
        .current-weather {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(16, 185, 129, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .current-weather .main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 20px 0;
        }

        .current-weather .weather-icon {
            font-size: 4rem;
        }

        .current-weather .temp {
            font-size: 3.5rem;
            font-weight: 700;
        }

        .current-weather .condition {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-bottom: 16px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        @media (max-width: 480px) {
            .forecast-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .forecast-card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 12px 8px;
            text-align: center;
        }

        .forecast-card .day {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .forecast-card .icon {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .forecast-card .temp {
            font-size: 0.875rem;
        }

        .forecast-card .temp .high {
            color: var(--accent);
            font-weight: 600;
        }

        .forecast-card .temp .low {
            color: var(--text-secondary);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        /* Install Prompt */
        .install-prompt {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            padding: 16px 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
        }

        .install-prompt.show {
            display: flex;
        }

        .install-prompt p {
            font-size: 0.875rem;
        }

        .install-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-weight: 600;
            cursor: pointer;
        }

        .dismiss-btn {
            background: transparent;
            color: var(--text-secondary);
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 8px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Animations */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hidden utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>QuickPulse</h1>
            <p>ワンタッチで最新ニュースと天気をチェック</p>
        </header>

        <!-- Fetch Button -->
        <section class="fetch-section">
            <button class="fetch-btn" id="fetchBtn">
                <span class="icon">⚡</span>
                <span>まとめて取得</span>
            </button>
        </section>

        <!-- Status Bar -->
        <div class="status-bar" id="statusBar">
            <span class="dot"></span>
            <span id="statusText">ニュースと天気を取得するにはタップ</span>
        </div>

        <!-- News Section -->
        <section class="news-section">
            <div class="section-header">
                <span class="icon">📰</span>
                <h2>週間ニュース</h2>
            </div>
            <div class="news-grid" id="newsContainer">
                <div class="empty-state" id="newsEmpty">
                    <div class="icon">📰</div>
                    <p>まだニュースがありません</p>
                    <p style="font-size: 0.75rem;">上のボタンをタップして取得</p>
                </div>
            </div>
        </section>

        <!-- Weather Section -->
        <section class="weather-section">
            <div class="section-header">
                <span class="icon">🌤️</span>
                <h2>天気予報</h2>
            </div>
            <div id="weatherContainer">
                <div class="empty-state" id="weatherEmpty">
                    <div class="icon">🌤️</div>
                    <p>まだ天気情報がありません</p>
                    <p style="font-size: 0.75rem;">上のボタンをタップして取得</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p id="lastUpdated">最終更新: --</p>
            <p style="margin-top: 8px;">© 2025 QuickPulse</p>
        </footer>
    </div>

    <!-- Install Prompt -->
    <div class="install-prompt" id="installPrompt">
        <p>アプリをホーム画面に追加</p>
        <button class="install-btn" id="installBtn">追加</button>
        <button class="dismiss-btn" id="dismissBtn">×</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
